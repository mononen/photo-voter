services:
  postgres:
    image: postgres:17-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-photovoter}
      POSTGRES_USER: ${POSTGRES_USER:-photovoter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-photovoter}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-photovoter}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:3000

volumes:
  postgres_data:
