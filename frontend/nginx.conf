server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API and photo requests to the backend container.
    # Remove this block if your reverse proxy routes /api/ directly to the backend.
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Allow large photo uploads / long-running picker session polls
        proxy_read_timeout 120s;
    }
}
