name: photo-voter

# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Before starting:
#   - Fill in the two image: fields below
#   - Create a .env file from .env.example and set real values
#   - Set PROXY_NETWORK below to the name of your existing reverse proxy network
#
# Frontend image must be built with:
#   docker build --target production \
#     --build-arg VITE_API_URL= \   # empty = relative URLs, nginx proxies /api/ to backend
#     -t your-registry/photo-voter-frontend:latest \
#     ./frontend
#
# Backend image must be built with:
#   docker build -t your-registry/photo-voter-backend:latest ./backend

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-photovoter}
      POSTGRES_USER: ${POSTGRES_USER:-photovoter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-photovoter}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    image: # TODO your-registry/photo-voter-backend:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  frontend:
    image: # TODO your-registry/photo-voter-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal  # talks to backend via nginx proxy block
      - proxy     # reachable by your reverse proxy

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  proxy:
    external: true
    name: ${PROXY_NETWORK:?set PROXY_NETWORK in .env to your reverse proxy network name}
